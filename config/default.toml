sys_name = "LaTeXTrans"
version = "0.1.0"
target_language = "ch"
source_language = "en"
paper_list = []
tex_sources_dir = "tex source"
output_dir = "outputs"
category = {}
update_term = "False"
mode = 0
user_term = ""
# 在译文 PDF 首页左侧加 arXiv 竖排戳(序号+分类+日期),模拟 arXiv 发布版。
# 仅对从 arXiv ID 翻译的论文生效;本地项目自动跳过。设 false 关闭。
arxiv_stamp = true
# Optional: path to a TOML file that overrides the built-in translation prompts.
# Only the prompt keys you list are replaced; the rest keep their defaults.
# See config/prompts.example.toml for the available keys and format.
user_prompt_file = ""

[llm_config]
# Translation backend: "api" (OpenAI-compatible HTTP), "claude_code" (local claude CLI),
# or "codex" (local OpenAI codex CLI; reuses your ChatGPT login, no API key).
backend = "api"
# For backend = "api": model name (e.g. deepseek-chat / gpt-4o), plus api_key and base_url.
# For backend = "claude_code": model is a claude alias (e.g. opus / sonnet); leave empty for
# the CLI default. api_key / base_url are ignored (uses your local Claude Code login).
# effort: reasoning effort. claude_code → low/medium/high/xhigh/max; codex → minimal/low/medium/high.
model = ""
effort = ""
api_key = ""
base_url = ""
# Optional: override concurrent LLM calls (default: api=10, claude_code=4).
# concurrency = 10